<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveMe - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1e293b !important; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-responsive { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .status-active { background-color: #d1e7dd; color: #0f5132; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-gauge-high me-2"></i> DriveMe Admin Control Panel</span>
            <button class="btn btn-outline-light btn-sm" onclick="location.reload()"><i class="fa-solid fa-rotate me-1"></i> Refresh Data</button>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card p-3 bg-white text-dark">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase mb-1" style="font-size: 0.8rem; letter-spacing: 1px;">Total Bookings</h6>
                            <h2 class="mb-0 fw-bold" id="totalBookingsCount">0</h2>
                        </div>
                        <div class="bg-primary bg-opacity-10 p-3 rounded text-primary"><i class="fa-solid fa-car fa-2xl"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <h4 class="mb-3 text-secondary fw-semibold">Live Ride Requests</h4>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Customer Details</th>
                        <th>Pickup & Drop Location</th>
                        <th>Vehicle Type</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <tr>
                        <td colspan="5" class="text-center text-muted py-4">
                            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div> Loading live requests...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Your Integrated Live Firebase configuration keys
        const firebaseConfig = {
            apiKey: "AIzaSyAHbiSkbqmGxPN26euzGWoSZr-w1FOg5jI",
            authDomain: "driveme4u.firebaseapp.com",
            databaseURL: "https://driveme4u-default-rtdb.firebaseio.com",
            projectId: "driveme4u",
            storageBucket: "driveme4u.firebasestorage.app",
            messagingSenderId: "354842870544",
            appId: "1:354842870544:web:25542720c3578c38889b95",
            measurementId: "G-J9FG4R4EFS"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Reference pointing to your 'bookings' path
        const bookingsRef = database.ref('bookings');

        // Fetch & Listen to Data changes automatically
        bookingsRef.on('value', (snapshot) => {
            const tableBody = document.getElementById('bookingsTableBody');
            const totalCounter = document.getElementById('totalBookingsCount');
            tableBody.innerHTML = ''; // Clear stale placeholders

            if (!snapshot.exists()) {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4"><i class="fa-solid fa-inbox fa-2xl mb-2 d-block text-black-50"></i> No bookings found in the database.</td></tr>`;
                totalCounter.innerText = "0";
                return;
            }

            let count = 0;
            snapshot.forEach((childSnapshot) => {
                count++;
                const bookingId = childSnapshot.key;
                const data = childSnapshot.val();

                // Clean data safety fallbacks
                const name = data.name || data.fullName || 'Anonymous';
                const phone = data.phone || data.phoneNumber || 'N/A';
                const pickup = data.pickup || data.pickupLocation || 'Not provided';
                const drop = data.drop || data.dropLocation || 'Not provided';
                const vehicle = data.vehicle || data.vehicleType || 'Standard';

                const rowHtml = `
                    <tr id="row-${bookingId}">
                        <td>
                            <div class="fw-bold text-dark">${name}</div>
                            <small class="text-muted"><i class="fa-solid fa-phone fa-xs me-1"></i> ${phone}</small>
                        </td>
                        <td>
                            <div class="text-truncate" style="max-width: 250px;"><i class="fa-solid fa-location-dot text-success me-1"></i> <strong>From:</strong> ${pickup}</div>
                            <div class="text-truncate text-muted" style="max-width: 250px;"><i class="fa-solid fa-flag-checkered text-danger me-1"></i> <strong>To:</strong> ${drop}</div>
                        </td>
                        <td>
                            <span class="badge bg-secondary text-capitalize">${vehicle}</span>
                        </td>
                        <td>
                            <span class="status-badge status-active"><i class="fa-solid fa-circle-dot fa-xs me-1"></i> Incoming</span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteBooking('${bookingId}')">
                                <i class="fa-regular fa-trash-can"></i> Complete / Clear
                            </button>
                        </td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', rowHtml);
            });

            totalCounter.innerText = count;
        });

        // Delete action to clear records from the real database dashboard
        function deleteBooking(id) {
            if (confirm("Are you sure you want to mark this ride request as complete and remove it?")) {
                database.ref('bookings/' + id).remove()
                    .then(() => {
                        alert("Booking removed successfully!");
                    })
                    .catch((error) => {
                        alert("Error removing booking: " + error.message);
                    });
            }
        }
    </script>
</body>
</html>
